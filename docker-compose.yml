version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: sic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sic_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sic-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: sic-redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sic-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sic-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sic_platform
      - DATABASE_SYNC_URL=postgresql://postgres:postgres@db:5432/sic_platform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_DIR=/app/storage/uploads
      - RESULT_DIR=/app/storage/results
      - CHINESE_FONT_PATH=/usr/share/fonts/truetype/wqy/wqy-microhei.ttc
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - DEBUG=true
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/results:/app/storage/results
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sic-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sic-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sic_platform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_DIR=/app/storage/uploads
      - RESULT_DIR=/app/storage/results
      - CHINESE_FONT_PATH=/usr/share/fonts/truetype/wqy/wqy-microhei.ttc
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/results:/app/storage/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    networks:
      - sic-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sic-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sic-network

volumes:
  postgres_data:
  redis_data:

networks:
  sic-network:
    driver: bridge